<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Trente Deux</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1A1A1A;
      font-family: 'Playfair Display', serif;
    }

    .circular-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .circular-logo__ring {
      transform-origin: center;
      animation: logo-rotate 28s linear infinite;
    }

    @keyframes logo-rotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Taille 200px pour démonstration - ajuster width/height pour le header -->
  <div class="circular-logo" style="width: 200px; height: 200px;">
    <svg viewBox="0 0 200 200" width="100%" height="100%">
      <defs>
        <path id="topArc"    d="M 15,100 A 85,85 0 0,1 185,100" fill="none" />
        <path id="bottomArc" d="M 185,100 A 85,85 0 0,1 15,100" fill="none" />
      </defs>

      <!-- Cercle extérieur rotatif -->
      <g class="circular-logo__ring">
        <circle cx="100" cy="100" r="85" fill="none" stroke="#F5F1E9" stroke-width="0.5" opacity="0.3" />

        <!-- Haut : TRENTE DEUX -->
        <text fill="#F5F1E9" style="font-family:'Playfair Display',serif; font-size:14px; letter-spacing:0.35em">
          <textPath href="#topArc" startOffset="50%" text-anchor="middle">TRENTE DEUX</textPath>
        </text>

        <!-- Bas : MAISON DE STRUCTURATION STRATÉGIQUE -->
        <text fill="#F5F1E9" style="font-family:'Playfair Display',serif; font-size:7.5px; letter-spacing:0.2em">
          <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">MAISON DE STRUCTURATION STRATÉGIQUE</textPath>
        </text>

        <!-- Séparateurs -->
        <circle cx="15"  cy="100" r="1.5" fill="#F5F1E9" opacity="0.6" />
        <circle cx="185" cy="100" r="1.5" fill="#F5F1E9" opacity="0.6" />
      </g>

      <!-- Centre fixe : 32 -->
      <text x="100" y="100" text-anchor="middle" dominant-baseline="central"
            fill="#F5F1E9"
            style="font-family:'Playfair Display',serif; font-size:42px; font-weight:400; letter-spacing:0.05em">
        32
      </text>
    </svg>
  </div>

</body>
</html>
